          const triggerHaptic = () => { if (window.navigator?.vibrate) window.navigator.vibrate(15); };

          const isOperator = (val) => ['+', '-', '×', '÷'].includes(val);

          const evaluateTokens = (tokensArray) => {
            if (!tokensArray || tokensArray.length === 0) return '0';
            let validTokens = [...tokensArray];
            if (isOperator(validTokens[validTokens.length - 1])) validTokens.pop();
            if (validTokens.length === 0) return '0';

            const doMath = (a, b, op) => {
                const numA = parseFloat(a); const numB = parseFloat(b);
                if (isNaN(numA) || isNaN(numB)) return 0;
                switch(op) {
                    case '+': return numA + numB; case '-': return numA - numB;
                    case '×': return numA * numB; case '÷': return numB === 0 ? 'Error' : numA / numB;
                    default: return 0;
                }
            };

            try {
                let p1 = [];
                for (let i = 0; i < validTokens.length; i++) {
                    const t = validTokens[i];
                    if (t === '×' || t === '÷') {
                        const prev = p1.pop(); const next = validTokens[i + 1];
                        if (next === undefined) { p1.push(prev); break; }
                        const res = doMath(prev, next, t);
                        if (res === 'Error') return 'Error';
                        p1.push(String(res)); i++;
                    } else p1.push(t);
                }

                let p2 = [];
                for (let i = 0; i < p1.length; i++) {
                    const t = p1[i];
                    if (t === '+' || t === '-') {
                        const prev = p2.pop(); const next = p1[i + 1];
                        if (next === undefined) { p2.push(prev); break; }
                        const res = doMath(prev, next, t);
                        p2.push(String(res)); i++;
                    } else p2.push(t);
                }
                const finalRes = parseFloat(p2[0]);
                if (isNaN(finalRes)) return 'Error';
                // Cap to 10 significant digits to prevent endless decimals overflowing the screen
                return String(parseFloat(finalRes.toPrecision(10)));

          };

            if (strVal.includes('e')) return strVal;
            const isNegative = strVal.startsWith('-');
            if (isNegative) strVal = strVal.substring(1);
            let [intPart, decPart] = strVal.split('.');
            if (intPart) intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");

              const guessA = guessCurrencyFromRate(multiPairs[0].a);
              const guessB = guessCurrencyFromRate(multiPairs[0].b);

            if (chartFilter === '1D') filterTime = startOfToday;
            if (chartFilter === '1W') filterTime = startOfWeek;
            if (chartFilter === '1M') filterTime = startOfMonth;

            const safeTx = Array.isArray(transactions) ? transactions : [];
            const sortedTx = [...safeTx].sort((a,b) => new Date(a.date) - new Date(b.date));

            const getHistoricalConfigRate = (cur, ts) => {
                if (cur === 'LAK') return 1;
                const sortedHistory = [...rateHistory].sort((a,b) => new Date(a.date).getTime() - new Date(b.date).getTime());
                let rate = null;
                for (let i = sortedHistory.length - 1; i >= 0; i--) {
                    if (new Date(sortedHistory[i].date).getTime() <= ts) { rate = sortedHistory[i].rates[cur]; if (rate) break; }
                }
                return rate || marketRates[cur] || 0;
            };

            const startRates = { USD: getHistoricalConfigRate('USD', filterTime - 1), USDT: getHistoricalConfigRate('USDT', filterTime - 1), THB: getHistoricalConfigRate('THB', filterTime - 1), CNY: getHistoricalConfigRate('CNY', filterTime - 1) };

            const pastTx = sortedTx.filter(tx => new Date(tx.date).getTime() < filterTime);
            const periodTx = sortedTx.filter(tx => new Date(tx.date).getTime() >= filterTime);

            let startBal = { LAK: Number(openingBalances.LAK)||0, USD: Number(openingBalances.USD)||0, USDT: Number(openingBalances.USDT)||0, THB: Number(openingBalances.THB)||0, CNY: Number(openingBalances.CNY)||0 };
            pastTx.forEach(tx => {
              if (tx.receiveCur && startBal[tx.receiveCur] !== undefined) startBal[tx.receiveCur] += tx.receiveAmt;
              if (tx.sendCur && startBal[tx.sendCur] !== undefined) startBal[tx.sendCur] -= tx.sendAmt;
            });

            const getStartVal = (bal) => (bal.LAK||0) + (bal.USD||0)*(startRates.USD||0) + (bal.USDT||0)*(startRates.USDT||0) + (bal.THB||0)*(startRates.THB||0) + (bal.CNY||0)*(startRates.CNY||0);
            const startTotalCash = getStartVal(startBal);

            let currentBal = { ...startBal };
            periodTx.forEach(tx => {
              if (tx.receiveCur && currentBal[tx.receiveCur] !== undefined) currentBal[tx.receiveCur] += tx.receiveAmt;
              if (tx.sendCur && currentBal[tx.sendCur] !== undefined) currentBal[tx.sendCur] -= tx.sendAmt;
            });

            const getCurrentVal = (bal) => (bal.LAK||0) + (bal.USD||0)*(marketRates.USD||0) + (bal.USDT||0)*(marketRates.USDT||0) + (bal.THB||0)*(marketRates.THB||0) + (bal.CNY||0)*(marketRates.CNY||0);
            const currentTotalCash = getCurrentVal(currentBal);

            let buyStats = { USD: { lakBought: 0, lakSpent: 0, thbBought: 0, thbSpent: 0 }, USDT: { lakBought: 0, lakSpent: 0, thbBought: 0, thbSpent: 0 }, THB: { lakBought: 0, lakSpent: 0 }, CNY: { lakBought: 0, lakSpent: 0, thbBought: 0, thbSpent: 0 } };

            let realizedLAK = 0; let realizedTHB = 0;
            let chartDataMap = new Map();
            let fifoQueues = { USD: { lakBuy: [], lakSell: [], thbBuy: [], thbSell: [] }, USDT: { lakBuy: [], lakSell: [], thbBuy: [], thbSell: [] }, THB: { lakBuy: [], lakSell: [] }, CNY: { lakBuy: [], lakSell: [], thbBuy: [], thbSell: [] } };

            periodTx.forEach(tx => {
                const date = new Date(tx.date);
                let key = ''; let label = '';
                if (chartFilter === '1D') { key = date.getHours().toString(); label = `${date.getHours()}:00`; }
                else if (chartFilter === '1W' || chartFilter === '1M') { key = date.toDateString(); label = `${date.getDate()}/${date.getMonth()+1}`; }
                else { key = `${date.getFullYear()}-${date.getMonth()}`; label = `${date.getMonth()+1}/${date.getFullYear().toString().slice(-2)}`; }

                if (!chartDataMap.has(key)) chartDataMap.set(key, { label, wp: 0, cg: 0, timestamp: date.getTime() });
                let bucket = chartDataMap.get(key);

                const getTxVal = (amt, cur) => amt * (cur === 'LAK' ? 1 : (marketRates[cur] || 0));
                bucket.cg += getTxVal(tx.receiveAmt, tx.receiveCur) - getTxVal(tx.sendAmt, tx.sendCur);

                if (tx.isTransfer) {
                    if (tx.receiveCur !== 'SYS') {
                        if (tx.receiveCur === 'THB') realizedTHB += tx.receiveAmt;
                        else realizedLAK += tx.receiveAmt * (tx.receiveCur === 'LAK' ? 1 : (marketRates[tx.receiveCur] || 0));
                    }
                    if (tx.sendCur !== 'SYS') {
                        if (tx.sendCur === 'THB') realizedTHB -= tx.sendAmt;
                        else realizedLAK -= tx.sendAmt * (tx.sendCur === 'LAK' ? 1 : (marketRates[tx.sendCur] || 0));
                    }
                }
                else if (!tx.isAdjustment) {
                    let txWPLAK = 0; let txWPTHB = 0;

                    if (tx.sendCur === 'LAK' && tx.receiveCur !== 'LAK') {
                      let cur = tx.receiveCur; if(!buyStats[cur]) buyStats[cur] = {lakBought: 0, lakSpent: 0, thbBought: 0, thbSpent: 0};
                      buyStats[cur].lakBought += tx.receiveAmt; buyStats[cur].lakSpent += tx.sendAmt;
                    }
                    if (tx.sendCur === 'THB' && !['LAK', 'THB'].includes(tx.receiveCur)) {
                      let cur = tx.receiveCur; if(!buyStats[cur]) buyStats[cur] = {lakBought: 0, lakSpent: 0, thbBought: 0, thbSpent: 0};
                      buyStats[cur].thbBought += tx.receiveAmt; buyStats[cur].thbSpent += tx.sendAmt;
                    }

                    ['USD', 'USDT', 'THB', 'CNY'].forEach(cur => {
                      if (tx.sendCur === 'LAK' && tx.receiveCur === cur) {
                        let rate = tx.sendAmt / tx.receiveAmt; let remaining = tx.receiveAmt;
                        while (remaining > 0 && fifoQueues[cur].lakSell.length > 0) {
                            let sell = fifoQueues[cur].lakSell[0]; let matchAmt = Math.min(remaining, sell.amt);
                            let profit = matchAmt * (sell.rate - rate);
                            txWPLAK += profit; realizedLAK += profit;
                            sell.amt -= matchAmt; remaining -= matchAmt;
                            if (sell.amt === 0) fifoQueues[cur].lakSell.shift();
                        }
                        if (remaining > 0) fifoQueues[cur].lakBuy.push({ amt: remaining, rate: rate });
                      }
                      else if (tx.receiveCur === 'LAK' && tx.sendCur === cur) {
                        let rate = tx.receiveAmt / tx.sendAmt; let remaining = tx.sendAmt;
                        while (remaining > 0 && fifoQueues[cur].lakBuy.length > 0) {
                            let buy = fifoQueues[cur].lakBuy[0]; let matchAmt = Math.min(remaining, buy.amt);
                            let profit = matchAmt * (rate - buy.rate);
                            txWPLAK += profit; realizedLAK += profit;
                            buy.amt -= matchAmt; remaining -= matchAmt;
                            if (buy.amt === 0) fifoQueues[cur].lakBuy.shift();
                        }
                        if (remaining > 0) fifoQueues[cur].lakSell.push({ amt: remaining, rate: rate });
                      }

                      if (cur !== 'THB') {
                        if (tx.sendCur === 'THB' && tx.receiveCur === cur) {
                          let rate = tx.sendAmt / tx.receiveAmt; let remaining = tx.receiveAmt;
                          while (remaining > 0 && fifoQueues[cur].thbSell.length > 0) {
                              let sell = fifoQueues[cur].thbSell[0]; let matchAmt = Math.min(remaining, sell.amt);
                              let profit = matchAmt * (sell.rate - rate);
                              txWPTHB += profit; realizedTHB += profit;
                              sell.amt -= matchAmt; remaining -= matchAmt;
                              if (sell.amt === 0) fifoQueues[cur].thbSell.shift();
                          }
                          if (remaining > 0) fifoQueues[cur].thbBuy.push({ amt: remaining, rate: rate });
                        }
                        else if (tx.receiveCur === 'THB' && tx.sendCur === cur) {
                          let rate = tx.receiveAmt / tx.sendAmt; let remaining = tx.sendAmt;
                          while (remaining > 0 && fifoQueues[cur].thbBuy.length > 0) {
                              let buy = fifoQueues[cur].thbBuy[0]; let matchAmt = Math.min(remaining, buy.amt);
                              let profit = matchAmt * (rate - buy.rate);
                              txWPTHB += profit; realizedTHB += profit;
                              buy.amt -= matchAmt; remaining -= matchAmt;
                              if (buy.amt === 0) fifoQueues[cur].thbBuy.shift();
                          }
                          if (remaining > 0) fifoQueues[cur].thbSell.push({ amt: remaining, rate: rate });
                        }
                      }
                    });
                    bucket.wp += txWPLAK + (txWPTHB * (marketRates.THB || 0));
                }
            });

            let totalWorkingProfit = realizedLAK + (realizedTHB * (marketRates.THB || 0));
            let chartData = Array.from(chartDataMap.values()).sort((a,b) => a.timestamp - b.timestamp);

            return { totalWorkingProfit, cashGrowth: currentTotalCash - startTotalCash, chartData, balances: currentBal, buyStats, periodTxCount: periodTx.length, periodTxList: periodTx.reverse() };
          }, [transactions, marketRates, openingBalances, chartFilter, rateHistory]);

              if (dashboardStats.buyStats[cur] && dashboardStats.buyStats[cur].lakBought > 0) { avgCost = dashboardStats.buyStats[cur].lakSpent / dashboardStats.buyStats[cur].lakBought; }
              let sellRate = liveRate * (1 + profitMargin); let buyRate = liveRate * (1 - profitMargin);
              return { buy: buyRate, sell: sellRate };

                <div className={`absolute inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end transition-opacity duration-300 ${showAlertModal ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                  <div className={`bg-white dark:bg-[#131722] w-full rounded-t-[32px] p-6 pb-28 border-t border-gray-200 dark:border-[#ffffff10] shadow-[0_-10px_50px_rgba(0,0,0,0.1)] dark:shadow-[0_-10px_50px_rgba(0,0,0,0.5)] transform transition-transform duration-300 ${showAlertModal ? 'translate-y-0' : 'translate-y-full'}`}>
                    <div className="w-12 h-1.5 bg-gray-200 dark:bg-[#ffffff15] rounded-full mx-auto mb-6"></div>
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="text-gray-900 dark:text-white text-xl font-bold">{t('setAlert')}</h3>
                      <button onClick={() => setShowAlertModal(false)} className="text-gray-500 dark:text-[#8F9BB3] bg-gray-100 dark:bg-[#1A202C] rounded-full p-1.5 active:scale-90 transition-transform"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                    </div>

                    <div className="flex flex-col gap-4">
                      <div className="flex gap-3">
                        <div className="flex-1">
                          <label className="text-[10px] text-gray-500 dark:text-[#8F9BB3] uppercase font-bold tracking-wider block mb-1.5">{t('asset')}</label>
                          <select value={newAlert.asset} onChange={e => setNewAlert({...newAlert, asset: e.target.value})} className="w-full bg-gray-50 dark:bg-[#0B0D14] text-blue-600 dark:text-[#3B82F6] p-3.5 rounded-xl border border-gray-200 dark:border-[#ffffff10] outline-none font-bold">
                            <option value="DXY">US Dollar Index (DXY)</option><option value="USDTHB">USD/THB</option><option value="CNYTHB">CNY/THB</option><option value="USDCNY">USD/CNY</option><option value="USDVND">USD/VND</option>
                          </select>
                        </div>
                        <div className="flex-1">
                          <label className="text-[10px] text-gray-500 dark:text-[#8F9BB3] uppercase font-bold tracking-wider block mb-1.5">{t('condition')}</label>
                          <select value={newAlert.condition} onChange={e => setNewAlert({...newAlert, condition: e.target.value})} className="w-full bg-gray-50 dark:bg-[#0B0D14] text-gray-900 dark:text-white p-3.5 rounded-xl border border-gray-200 dark:border-[#ffffff10] outline-none font-bold">
                            <option value="above">{t('above')}</option><option value="below">{t('below')}</option>
                          </select>
                        </div>
                      </div>
                      <div>
                        <label className="text-[10px] text-gray-500 dark:text-[#8F9BB3] uppercase font-bold tracking-wider block mb-1.5">{t('targetPrice')}</label>
                        <input type="number" value={newAlert.price} onChange={e => setNewAlert({...newAlert, price: e.target.value})} className="w-full bg-gray-50 dark:bg-[#0B0D14] text-gray-900 dark:text-white p-4 rounded-xl border border-gray-200 dark:border-[#ffffff10] outline-none font-semibold text-lg transition-colors focus:border-blue-500 dark:focus:border-[#3B82F6]" placeholder={`e.g. ${formatDisplay(livePrices[newAlert.asset])}`} />
                      </div>
                      <button onClick={handleSaveAlert} className="w-full mt-2 bg-blue-600 dark:bg-[#3B82F6] hover:bg-blue-700 dark:hover:bg-[#2563EB] text-white py-4 rounded-2xl font-bold shadow-[0_4px_15px_rgba(59,130,246,0.3)] transition-colors">{t('saveAlert')}</button>
                    </div>
                  </div>
                </div>

                {/* --- GOOGLE SIGN IN MODAL --- */}
                <div className={`absolute inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center transition-opacity duration-300 ${showLoginModal ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                  <div className={`bg-white dark:bg-[#131722] w-[85%] rounded-[32px] p-8 border border-gray-200 dark:border-[#ffffff10] text-center transform transition-transform duration-300 shadow-2xl ${showLoginModal ? 'scale-100' : 'scale-95'}`}>
                    <div className="w-16 h-16 bg-blue-50 dark:bg-[#3B82F6]/10 rounded-2xl mx-auto mb-5 flex items-center justify-center">
                       <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <h3 className="text-gray-900 dark:text-white text-2xl font-bold mb-2 tracking-tight">Save Your Data</h3>
                    <p className="text-gray-500 dark:text-[#8F9BB3] text-sm font-medium mb-6">Sign in to permanently save your transactions, profit tracker, and configurations. Otherwise, they will be lost if you clear your browser.</p>
                    <div className="flex flex-col gap-3">
                      <button onClick={handleGoogleSignIn} className="w-full bg-blue-600 hover:bg-blue-700 dark:bg-[#3B82F6] dark:hover:bg-[#2563EB] text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all shadow-md">
                        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                        Sign in with Google
                      </button>
                      <button onClick={handleSkipLogin} className="w-full bg-gray-100 hover:bg-gray-200 dark:bg-[#1A202C] dark:hover:bg-[#212836] text-gray-700 dark:text-[#8F9BB3] font-bold py-3.5 rounded-xl active:scale-95 transition-all">Skip for now</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
